<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="description" content="ProБелок - умный помощник по питанию с фокусом на белок">
    <meta name="theme-color" content="#6B9DFF">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="ProБелок">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <title>ProБелок</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="food/food-database-complete.js?v=2"></script>
    <script src="food/mega-food-extension.js?v=2"></script>
    <script src="food/ready-meals-extension.js?v=2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800&family=Poppins:wght@400;500;600&display=swap');

        :root {
            /* App colors - спокойная читаемая схема */
            --primary: #6B9DFF;
            --primary-dark: #4A7DD6;
            --secondary: #5DB8A6;
            --secondary-dark: #4A9A8A;
            --accent: #FFB347;
            --bg-dark: #0D1117;
            --bg-card: #161B22;
            --bg-elevated: #21262D;
            --bg-input: #2A3038;
            --text-primary: #F0F6FC;
            --text-secondary: #8B949E;
            --text-muted: #6E7681;
            --border-color: #30363D;
            --success: #3FB950;
            --warning: #D29922;

            /* Telegram theme colors (fallback) */
            --tg-theme-bg-color: #1c1c1e;
            --tg-theme-text-color: #ffffff;
            --tg-theme-hint-color: #8e8e93;
            --tg-theme-link-color: #0a84ff;
            --tg-theme-button-color: #0a84ff;
            --tg-theme-button-text-color: #ffffff;
            --tg-theme-secondary-bg-color: #2c2c2e;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg-dark);
            min-height: 100vh;
            color: var(--text-primary);
            line-height: 1.6;
            padding-top: var(--tg-viewport-top, 0px);
            padding-bottom: var(--tg-viewport-bottom, 0px);
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background:
                radial-gradient(circle at 20% 50%, rgba(107, 157, 255, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(93, 184, 166, 0.08) 0%, transparent 50%);
            animation: float 20s ease-in-out infinite;
            pointer-events: none;
            z-index: 0;
        }

        /* Telegram theme adaptation */
        .tg-adapted body::before {
            display: none;
        }

        .tg-adapted body {
            background: var(--tg-theme-bg-color, var(--bg-dark));
        }

        .container {
            background: transparent;
        }

        /* Базовые стили для всех (браузер + Telegram) */
        input, select {
            background: var(--bg-input);
            color: var(--text-primary);
            border: 2px solid var(--border-color);
        }

        label {
            color: var(--text-secondary);
        }

        .btn {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: #ffffff;
        }

        .section-title {
            color: var(--text-primary);
        }

        .meal-item {
            background: var(--bg-elevated);
            border: 1px solid var(--border-color);
        }

        .meal-info h4 {
            color: var(--text-primary);
        }

        .modal-content {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
        }

        .modal-title {
            color: var(--text-primary);
        }

        .food-item {
            background: var(--bg-elevated);
            border: 1px solid var(--border-color);
        }

        .food-name {
            color: var(--text-primary);
        }

        .food-protein {
            color: var(--secondary);
        }

        .category-title {
            color: var(--text-secondary);
        }

        .search-input {
            background: var(--bg-input);
            color: var(--text-primary);
            border: 2px solid var(--border-color);
        }

        .search-input::placeholder {
            color: var(--text-muted);
        }

        .custom-form {
            background: var(--bg-elevated);
            border: 1px solid var(--border-color);
        }

        .custom-form h4 {
            color: var(--text-primary);
        }

        .portion-selector {
            background: var(--bg-elevated);
            border: 1px solid var(--border-color);
        }

        .portion-selector h4 {
            color: var(--text-primary);
        }

        .portion-amount {
            color: var(--text-primary);
        }

        .close-btn {
            color: var(--text-muted);
        }

        .close-btn:hover {
            color: var(--primary);
        }

        .btn-secondary {
            background: transparent;
            color: var(--secondary);
            border: 2px solid var(--secondary);
        }

        .btn-secondary:hover {
            background: var(--secondary);
            color: var(--bg-dark);
        }

        .search-empty,
        .search-loading {
            color: var(--text-muted);
        }

        .progress-section {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
        }

        .meals-section {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
        }

        .stat {
            background: rgba(107, 157, 255, 0.12);
            border: 1px solid rgba(107, 157, 255, 0.15);
        }

        .stat-number {
            color: var(--primary);
        }

        .meal-protein {
            color: var(--secondary);
        }

        /* Telegram theme adaptation - переопределяем цвета из Telegram */
        .tg-adapted body {
            background: var(--tg-theme-bg-color, var(--bg-dark));
        }

        .tg-adapted input,
        .tg-adapted select {
            background: var(--tg-theme-secondary-bg-color, var(--bg-input));
            color: var(--tg-theme-text-color, var(--text-primary));
            border-color: var(--tg-theme-hint-color, var(--border-color));
        }

        .tg-adapted label {
            color: var(--tg-theme-hint-color, var(--text-secondary));
        }

        .tg-adapted .btn {
            background: linear-gradient(135deg, var(--tg-theme-button-color) 0%, var(--tg-theme-button-color) 100%);
            color: var(--tg-theme-button-text-color);
        }

        /* Safe area for mobile devices */
        .safe-area-top {
            padding-top: env(safe-area-inset-top, 0px);
        }

        .safe-area-bottom {
            padding-bottom: env(safe-area-inset-bottom, 0px);
        }

        /* Disable text selection for better UX */
        .tg-adapted * {
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        .tg-adapted input,
        .tg-adapted select {
            user-select: text;
        }

        /* Mobile viewport fixes */
        html {
            -webkit-text-size-adjust: 100%;
            -ms-text-size-adjust: 100%;
        }

        /* Prevent zoom on input focus */
        @media (max-width: 768px) {
            input, select, textarea {
                font-size: 16px !important;
            }
        }

        /* Fix for iOS Safari address bar */
        body {
            position: fixed;
            width: 100%;
            height: 100vh;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        .container {
            height: 100vh;
            overflow-y: auto;
            padding-bottom: calc(20px + env(safe-area-inset-bottom, 0px));
        }

        /* Modal mobile improvements */
        @media (max-height: 600px) {
            .modal-content {
                max-height: 90vh;
                padding: 20px;
            }

            .progress-circle {
                width: 160px;
                height: 160px;
            }

            .progress-number {
                font-size: 2.5rem;
            }
        }

        /* Food item touch target */
        .food-item {
            min-height: 52px;
        }

        /* Button active states for mobile */
        .btn:active,
        .add-btn:active,
        .portion-btn:active {
            transform: scale(0.95);
        }
        
        @keyframes float {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(1.1); }
        }
        
        h1, h2, h3 {
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
        }
        
        .container {
            max-width: 480px;
            margin: 0 auto;
            padding: 20px;
            min-height: 100vh;
            position: relative;
            z-index: 1;
        }
        
        /* Onboarding Screen */
        .screen {
            display: none;
            animation: slideIn 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }
        
        .screen.active {
            display: block;
        }
        
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(30px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .onboarding {
            text-align: center;
            padding: 40px 0;
        }
        
        .onboarding h1 {
            font-family: 'Montserrat', sans-serif;
            font-size: 3.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--text-primary) 0%, var(--primary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
            animation: pulse 2s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        .onboarding-subtitle {
            color: var(--text-secondary);
            font-size: 1rem;
            margin-bottom: 50px;
            font-weight: 500;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            display: block;
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-bottom: 8px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input, select {
            width: 100%;
            padding: 16px 20px;
            border: 2px solid var(--border-color);
            border-radius: 16px;
            font-size: 1rem;
            font-family: 'Poppins', sans-serif;
            background: var(--bg-input);
            color: var(--text-primary);
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--primary);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(107, 157, 255, 0.2);
        }

        .btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 1.1rem;
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 30px;
            box-shadow: 0 10px 30px rgba(107, 157, 255, 0.3);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(107, 157, 255, 0.4);
        }

        .btn:active {
            transform: translateY(-1px);
        }

        /* Main Screen */
        .header {
            text-align: center;
            padding: 20px 0 30px;
        }

        .header h1 {
            font-family: 'Montserrat', sans-serif;
            font-size: 2rem;
            font-weight: 800;
            color: var(--text-primary);
            margin-bottom: 5px;
            text-shadow: 0 3px 10px rgba(0,0,0,0.3);
        }

        .date {
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        /* Progress Circle */
        .progress-section {
            background: var(--bg-card);
            border-radius: 30px;
            padding: 40px 20px;
            margin-bottom: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            position: relative;
            overflow: hidden;
            border: 1px solid var(--border-color);
        }

        .progress-section::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(from 0deg, transparent, rgba(107, 157, 255, 0.08), transparent 30%);
            animation: rotate 4s linear infinite;
        }
        
        @keyframes rotate {
            100% { transform: rotate(360deg); }
        }
        
        .progress-section > * {
            position: relative;
            z-index: 1;
        }
        
        .progress-circle {
            width: 220px;
            height: 220px;
            margin: 0 auto 25px;
            position: relative;
        }
        
        .progress-ring {
            transform: rotate(-90deg);
        }
        
        .progress-ring-circle {
            stroke: var(--border-color);
            fill: transparent;
            stroke-width: 15;
        }

        .progress-ring-circle-fill {
            stroke: var(--primary);
            fill: transparent;
            stroke-width: 15;
            stroke-dasharray: 565.48;
            stroke-dashoffset: 565.48;
            transition: stroke-dashoffset 1s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            stroke-linecap: round;
            filter: drop-shadow(0 0 10px rgba(107, 157, 255, 0.4));
        }

        .progress-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }

        .progress-number {
            font-family: 'Montserrat', sans-serif;
            font-size: 3.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1;
        }

        .progress-label {
            font-size: 1rem;
            color: var(--text-muted);
            margin-top: 5px;
            font-weight: 600;
        }

        .stats-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            padding-top: 25px;
            border-top: 1px solid var(--border-color);
        }

        .stat {
            background: linear-gradient(135deg, rgba(107, 157, 255, 0.1) 0%, rgba(93, 184, 166, 0.1) 100%);
            padding: 15px;
            border-radius: 16px;
            text-align: center;
            border: 1px solid rgba(107, 157, 255, 0.15);
            flex: 1;
        }

        .stat-number {
            font-family: 'Montserrat', sans-serif;
            font-size: 1.8rem;
            color: var(--primary);
            font-weight: 700;
            display: block;
        }

        .stat-label {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 5px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Meals Section */
        .meals-section {
            background: var(--bg-card);
            border-radius: 25px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            border: 1px solid var(--border-color);
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .section-title {
            font-family: 'Montserrat', sans-serif;
            font-size: 1.4rem;
            color: var(--text-primary);
            font-weight: 700;
        }

        .add-btn {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, var(--secondary) 0%, var(--secondary-dark) 100%);
            color: white;
            border: none;
            border-radius: 50%;
            font-size: 1.8rem;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 20px rgba(93, 184, 166, 0.4);
            line-height: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 300;
        }

        .add-btn:hover {
            transform: rotate(90deg) scale(1.1);
            box-shadow: 0 8px 30px rgba(93, 184, 166, 0.6);
        }

        .meal-item {
            padding: 18px 20px;
            background: var(--bg-elevated);
            border-radius: 16px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s ease;
            border-left: 4px solid var(--secondary);
            animation: slideIn 0.3s ease;
            border: 1px solid var(--border-color);
        }

        .meal-item:hover {
            transform: translateX(5px);
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
        }

        .meal-item:last-child {
            border-bottom: none;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .meal-info h4 {
            color: var(--text-primary);
            font-size: 1.1rem;
            margin-bottom: 5px;
            font-weight: 600;
        }

        .meal-details {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .meal-protein {
            font-family: 'Montserrat', sans-serif;
            font-size: 1.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--secondary) 0%, var(--secondary-dark) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-muted);
        }

        /* Suggestions */
        .suggestions-section {
            background: linear-gradient(135deg, var(--bg-elevated) 0%, var(--bg-input) 100%);
            border-radius: 25px;
            padding: 25px;
            color: var(--text-primary);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border-color);
        }
        
        .suggestions-section h3 {
            font-family: 'Montserrat', sans-serif;
            margin-bottom: 15px;
            font-size: 1.3rem;
            font-weight: 700;
        }
        
        .suggestion-item {
            background: var(--bg-input);
            padding: 14px 18px;
            border-radius: 14px;
            margin-bottom: 10px;
            border-left: 3px solid var(--primary);
            font-weight: 500;
            color: var(--text-primary);
        }

        .suggestion-item:last-child {
            margin-bottom: 0;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            backdrop-filter: blur(10px);
        }

        .modal.active {
            display: flex;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.3s ease;
        }

        .modal-content {
            background: var(--bg-card);
            border-radius: 30px;
            padding: 30px;
            max-width: 400px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            animation: bounceIn 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            box-shadow: 0 30px 80px rgba(0,0,0,0.5);
            border: 1px solid var(--border-color);
        }

        @keyframes bounceIn {
            from {
                opacity: 0;
                transform: scale(0.7) translateY(50px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .modal-title {
            font-family: 'Montserrat', sans-serif;
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--text-primary);
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 2rem;
            color: var(--text-muted);
            cursor: pointer;
            line-height: 1;
            transition: all 0.2s ease;
        }

        .close-btn:hover {
            color: var(--primary);
            transform: rotate(90deg);
        }

        .food-category {
            margin-bottom: 25px;
        }

        .category-title {
            font-family: 'Montserrat', sans-serif;
            font-size: 1.1rem;
            color: var(--text-secondary);
            margin-bottom: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .food-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 18px;
            background: var(--bg-elevated);
            border-radius: 14px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            border-left: 3px solid transparent;
            border: 1px solid var(--border-color);
        }

        .food-item:hover {
            background: var(--bg-input);
            border-left-color: var(--secondary);
            transform: translateX(5px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .food-name {
            font-weight: 400;
            color: var(--text-primary);
        }

        .food-protein {
            font-family: 'Montserrat', sans-serif;
            color: var(--secondary);
            font-weight: 700;
        }

        .portion-selector {
            display: none;
            margin-top: 20px;
            padding: 20px;
            background: var(--bg-elevated);
            border-radius: 16px;
            border: 1px solid var(--border-color);
        }

        .portion-selector.active {
            display: block;
        }

        .portion-controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin: 20px 0;
        }

        .portion-btn {
            width: 40px;
            height: 40px;
            background: var(--secondary);
            color: white;
            border: none;
            border-radius: 50%;
            font-size: 1.5rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .portion-btn:hover {
            background: var(--secondary-dark);
            transform: scale(1.1);
        }

        .portion-amount {
            font-family: 'Montserrat', sans-serif;
            font-size: 2rem;
            font-weight: 700;
            color: var(--text-primary);
            min-width: 60px;
            text-align: center;
        }

        .search-container {
            margin-bottom: 20px;
        }

        .search-input {
            width: 100%;
            margin-bottom: 10px;
            padding: 14px 18px;
            border: 2px solid var(--border-color);
            border-radius: 14px;
            font-size: 1rem;
            background: var(--bg-input);
            color: var(--text-primary);
        }

        .btn-secondary {
            width: 100%;
            padding: 12px;
            background: transparent;
            color: var(--secondary);
            border: 2px solid var(--secondary);
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-secondary:hover {
            background: var(--secondary);
            color: var(--bg-dark);
        }

        .search-results {
            margin-bottom: 20px;
        }

        .search-loading {
            text-align: center;
            padding: 20px;
            color: var(--text-muted);
        }

        .search-empty {
            text-align: center;
            padding: 20px;
            color: var(--text-muted);
        }

        .custom-form {
            display: none;
            background: var(--bg-elevated);
            padding: 20px;
            border-radius: 16px;
            margin-bottom: 20px;
            border: 1px solid var(--border-color);
        }

        .custom-form.active {
            display: block;
        }

        .custom-form h4 {
            font-family: 'Montserrat', sans-serif;
            color: var(--text-primary);
            margin-bottom: 15px;
            font-weight: 700;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 10px;
        }

        .form-row input {
            margin-bottom: 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Onboarding Screen -->
        <div id="onboarding-screen" class="screen active">
            <div class="onboarding">
                <h1>ProБелок</h1>
                <p class="onboarding-subtitle">Мы заботимся о вашем теле и вашем здоровье</p>
                
                <form id="onboarding-form">
                    <div class="form-group">
                        <label for="weight">Вес (кг)</label>
                        <input type="number" id="weight" required min="30" max="200">
                    </div>
                    
                    <div class="form-group">
                        <label for="height">Рост (см)</label>
                        <input type="number" id="height" required min="100" max="250">
                    </div>
                    
                    <div class="form-group">
                        <label for="age">Возраст</label>
                        <input type="number" id="age" required min="15" max="100">
                    </div>
                    
                    <div class="form-group">
                        <label for="gender">Пол</label>
                        <select id="gender" required>
                            <option value="">Выберите</option>
                            <option value="male">Мужской</option>
                            <option value="female">Женский</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="activity">Уровень активности</label>
                        <select id="activity" required>
                            <option value="">Выберите</option>
                            <option value="sedentary">Сижу большую часть дня</option>
                            <option value="light">Легкая активность (прогулки)</option>
                            <option value="light_exercise">Тренировки 2 раза в неделю</option>
                            <option value="moderate">Регулярные тренировки 3-4 раза в неделю</option>
                            <option value="active">Активные тренировки 5-6 раз в неделю</option>
                            <option value="very_active">Интенсивные тренировки каждый день</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="goal">Цель</label>
                        <select id="goal" required>
                            <option value="">Выберите</option>
                            <option value="lose">Снизить вес</option>
                            <option value="maintain">Поддерживать вес</option>
                            <option value="gain">Набрать массу</option>
                        </select>
                    </div>
                    
                    <button type="submit" class="btn">Начать</button>
                </form>
            </div>
        </div>

        <!-- Main Screen -->
        <div id="main-screen" class="screen">
            <div class="header">
                <h1>Привет, чемпион! 💪</h1>
                <p class="date" id="current-date"></p>
            </div>

            <div class="progress-section">
                <div class="progress-circle">
                    <svg class="progress-ring" width="200" height="200">
                        <circle class="progress-ring-circle" stroke-width="12" fill="transparent" r="90" cx="100" cy="100"/>
                        <circle class="progress-ring-circle-fill" stroke-width="12" fill="transparent" r="90" cx="100" cy="100"/>
                    </svg>
                    <div class="progress-text">
                        <div class="progress-number" id="protein-consumed">0</div>
                        <div class="progress-label">из <span id="protein-goal">0</span>г</div>
                    </div>
                </div>
                
                <div class="stats-row">
                    <div class="stat">
                        <div class="stat-number" id="calories-consumed">0</div>
                        <div class="stat-label">ккал</div>
                    </div>
                    <div class="stat">
                        <div class="stat-number" id="carbs-consumed">0</div>
                        <div class="stat-label">углеводы</div>
                    </div>
                    <div class="stat">
                        <div class="stat-number" id="fats-consumed">0</div>
                        <div class="stat-label">жиры</div>
                    </div>
                </div>
            </div>

            <div class="meals-section">
                <div class="section-header">
                    <h3 class="section-title">Сегодня</h3>
                    <button class="add-btn" id="add-meal-btn">+</button>
                </div>
                <div id="meals-list">
                    <div class="empty-state">
                        <p>Добавьте первый прием пищи</p>
                    </div>
                </div>
            </div>

            <div class="suggestions-section" id="suggestions">
                <h3>💡 Подсказка дня</h3>
                <div id="suggestions-list"></div>
            </div>
        </div>
    </div>

    <!-- Add Meal Modal -->
    <div id="meal-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title">Добавить продукт</h3>
                <button class="close-btn" id="close-modal">&times;</button>
            </div>
            
            <div class="search-container">
                <input type="text" id="food-search" placeholder="Поиск продуктов..." class="search-input">
                <button class="btn-secondary" id="add-custom-btn">+ Свой продукт</button>
            </div>
            
            <div id="custom-form" class="custom-form">
                <h4>Добавить свой продукт</h4>
                <div class="form-group">
                    <label>Название</label>
                    <input type="text" id="custom-name" placeholder="Название продукта">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Белки (г)</label>
                        <input type="number" id="custom-protein" placeholder="0" min="0">
                    </div>
                    <div class="form-group">
                        <label>Жиры (г)</label>
                        <input type="number" id="custom-fats" placeholder="0" min="0">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Углеводы (г)</label>
                        <input type="number" id="custom-carbs" placeholder="0" min="0">
                    </div>
                    <div class="form-group">
                        <label>Калории</label>
                        <input type="number" id="custom-calories" placeholder="0" min="0">
                    </div>
                </div>
                <button class="btn" id="save-custom-product">Сохранить продукт</button>
            </div>
            
            <div id="search-results" class="search-results"></div>
            <div id="food-categories"></div>
            
            <div id="portion-selector" class="portion-selector">
                <h4 style="margin-bottom: 15px; color: var(--deep-sage);">Порция (г)</h4>
                <div class="portion-controls">
                    <button class="portion-btn" id="decrease-portion">−</button>
                    <div class="portion-amount" id="portion-amount">100</div>
                    <button class="portion-btn" id="increase-portion">+</button>
                </div>
                <button class="btn" id="confirm-meal">Добавить</button>
            </div>
        </div>
    </div>

    <script>
        // Telegram WebApp
        const tg = window.Telegram.WebApp;
        let tgUser = null;

        // Объединение баз продуктов из подключенных файлов
        function mergeFoodDatabases() {
            try {
                const base = (typeof foodDatabaseComplete !== 'undefined') ? foodDatabaseComplete : {};
                const mega = (typeof megaFoodExtension !== 'undefined') ? megaFoodExtension : {};
                const ready = (typeof readyMealsExtension !== 'undefined') ? readyMealsExtension : {};

                const totalCategories = Object.keys(base).length + Object.keys(mega).length + Object.keys(ready).length;
                const totalFoods = Object.values(base).flat().length + Object.values(mega).flat().length + Object.values(ready).flat().length;

                console.log('✅ База данных продуктов загружена:', {
                    категорий: totalCategories,
                    продуктов: totalFoods,
                    base: Object.keys(base).length + ' категорий',
                    mega: Object.keys(mega).length + ' категорий',
                    ready: Object.keys(ready).length + ' категорий'
                });

                // Объединяем все базы в одну
                return { ...base, ...mega, ...ready };
            } catch (error) {
                console.error('❌ Ошибка при загрузке базы данных продуктов:', error);
                // Возвращаем пустую базу с одной категорией по умолчанию
                return {
                    'Базовые продукты': [
                        { name: 'Куриная грудка', protein: 31, carbs: 0, fats: 3.6, calories: 165 },
                        { name: 'Рис отварной', protein: 2.7, carbs: 28, fats: 0.3, calories: 116 },
                        { name: 'Яйцо куриное', protein: 13, carbs: 0.7, fats: 11, calories: 157 }
                    ]
                };
            }
        }

        // Food Database (объединённая)
        const foodDatabase = mergeFoodDatabases();

        // Проверка что база не пустая
        if (Object.keys(foodDatabase).length === 0) {
            console.warn('⚠️ База данных продуктов пуста!');
        }

        // Initialize Telegram app
        function initTelegram() {
            if (tg && tg.initDataUnsafe && tg.initDataUnsafe.user) {
                tgUser = tg.initDataUnsafe.user;
                
                // Apply Telegram theme
                document.documentElement.style.setProperty('--tg-theme-bg-color', tg.themeParams.bg_color || '#ffffff');
                document.documentElement.style.setProperty('--tg-theme-text-color', tg.themeParams.text_color || '#000000');
                document.documentElement.style.setProperty('--tg-theme-hint-color', tg.themeParams.hint_color || '#999999');
                document.documentElement.style.setProperty('--tg-theme-link-color', tg.themeParams.link_color || '#2481cc');
                document.documentElement.style.setProperty('--tg-theme-button-color', tg.themeParams.button_color || '#2481cc');
                document.documentElement.style.setProperty('--tg-theme-button-text-color', tg.themeParams.button_text_color || '#ffffff');
                document.documentElement.style.setProperty('--tg-theme-secondary-bg-color', tg.themeParams.secondary_bg_color || '#f4f4f5');
                
                // Add adapted class
                document.body.classList.add('tg-adapted');
                
                // Expand to full height
                tg.expand();
                
                // Ready signal
                tg.ready();
                
                // Enable closing confirmation
                tg.enableClosingConfirmation();
                
                // Handle theme changes
                tg.onEvent('themeChanged', () => {
                    document.documentElement.style.setProperty('--tg-theme-bg-color', tg.themeParams.bg_color || '#ffffff');
                    document.documentElement.style.setProperty('--tg-theme-text-color', tg.themeParams.text_color || '#000000');
                    document.documentElement.style.setProperty('--tg-theme-hint-color', tg.themeParams.hint_color || '#999999');
                    document.documentElement.style.setProperty('--tg-theme-link-color', tg.themeParams.link_color || '#2481cc');
                    document.documentElement.style.setProperty('--tg-theme-button-color', tg.themeParams.button_color || '#2481cc');
                    document.documentElement.style.setProperty('--tg-theme-button-text-color', tg.themeParams.button_text_color || '#ffffff');
                    document.documentElement.style.setProperty('--tg-theme-secondary-bg-color', tg.themeParams.secondary_bg_color || '#f4f4f5');
                });
                
                // Handle viewport changes
                tg.onEvent('viewportChanged', () => {
                    document.documentElement.style.setProperty('--tg-viewport-top', tg.viewportStableTop + 'px');
                    document.documentElement.style.setProperty('--tg-viewport-bottom', tg.viewportStableBottom + 'px');
                });
                
                console.log('Telegram user:', tgUser);
            } else {
                console.log('Opened outside Telegram');
            }
        }

        // State
        let userData = {};
        let meals = [];
        let selectedFood = null;
        let portionSize = 100;
        let customProducts = [];

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            initTelegram();
            checkUserData();
            updateDate();
            loadCustomProducts();
            setupMainButton();
        });

        function loadCustomProducts() {
            const saved = localStorage.getItem('customProducts');
            if (saved) {
                customProducts = JSON.parse(saved);
            }
        }

        function saveCustomProducts() {
            localStorage.setItem('customProducts', JSON.stringify(customProducts));
        }

        // Setup Telegram MainButton
        function setupMainButton() {
            if (tg && tg.MainButton) {
                // Configure MainButton for adding meals
                tg.MainButton.setText('ДОБАВИТЬ ПРОДУКТ');
                tg.MainButton.setTextColor(tg.themeParams.button_text_color || '#ffffff');
                tg.MainButton.setColor(tg.themeParams.button_color || '#FF6B9D');

                // Hide by default - show only when modal is open
                tg.MainButton.hide();

                tg.MainButton.onClick(() => {
                    // Add meal when MainButton is clicked in portion selector
                    if (selectedFood && document.getElementById('portion-selector').classList.contains('active')) {
                        document.getElementById('confirm-meal').click();
                    }
                });
            }
        }

        function checkUserData() {
            const saved = localStorage.getItem('proteinAppUser');
            if (saved) {
                userData = JSON.parse(saved);
                
                // Use Telegram user name if available
                if (tgUser) {
                    userData.firstName = tgUser.first_name;
                    userData.lastName = tgUser.last_name;
                    userData.username = tgUser.username;
                }
                
                loadMeals();
                showMainScreen();
            }
        }

        function updateDate() {
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            document.getElementById('current-date').textContent = 
                new Date().toLocaleDateString('ru-RU', options);
        }

        // Onboarding
        document.getElementById('onboarding-form').addEventListener('submit', (e) => {
            e.preventDefault();

            const weight = parseFloat(document.getElementById('weight').value);
            const height = parseFloat(document.getElementById('height').value);
            const age = parseInt(document.getElementById('age').value);
            const gender = document.getElementById('gender').value;
            const activity = document.getElementById('activity').value;
            const goal = document.getElementById('goal').value;

            // Calculate BMR (Mifflin-St Jeor)
            let bmr;
            if (gender === 'male') {
                bmr = 10 * weight + 6.25 * height - 5 * age + 5;
            } else {
                bmr = 10 * weight + 6.25 * height - 5 * age - 161;
            }

            // Activity multipliers
            const activityMultipliers = {
                sedentary: 1.2,
                light: 1.375,
                light_exercise: 1.45,
                moderate: 1.55,
                active: 1.725,
                very_active: 1.9
            };

            let tdee = bmr * activityMultipliers[activity];

            // Adjust for goal
            if (goal === 'lose') {
                tdee *= 0.85;
            } else if (goal === 'gain') {
                tdee *= 1.15;
            }

            // Calculate protein (2g per kg for weight loss/maintenance, 2.2g for gain)
            const proteinMultiplier = goal === 'gain' ? 2.2 : 2;
            const proteinGoal = Math.round(weight * proteinMultiplier);

            // Calculate other macros
            const proteinCalories = proteinGoal * 4;
            const fatCalories = tdee * 0.3;
            const carbCalories = tdee - proteinCalories - fatCalories;

            userData = {
                weight,
                height,
                age,
                gender,
                activity,
                goal,
                calories: Math.round(tdee),
                protein: proteinGoal,
                carbs: Math.round(carbCalories / 4),
                fats: Math.round(fatCalories / 9),
                // Telegram user data
                firstName: tgUser ? tgUser.first_name : null,
                lastName: tgUser ? tgUser.last_name : null,
                username: tgUser ? tgUser.username : null
            };

            localStorage.setItem('proteinAppUser', JSON.stringify(userData));
            
            // Haptic feedback for Telegram
            if (tg && tg.HapticFeedback) {
                tg.HapticFeedback.notificationOccurred('success');
            }
            
            showMainScreen();
        });

        function showMainScreen() {
            document.getElementById('onboarding-screen').classList.remove('active');
            document.getElementById('main-screen').classList.add('active');
            
            // Personalize greeting with Telegram user name
            if (userData.firstName) {
                const headerTitle = document.querySelector('.header h1');
                headerTitle.textContent = `Привет, ${userData.firstName}! 💪`;
            }
            
            updateDisplay();
            generateSuggestions();
        }

        function loadMeals() {
            const today = new Date().toDateString();
            const saved = localStorage.getItem('proteinAppMeals_' + today);
            if (saved) {
                meals = JSON.parse(saved);
            } else {
                meals = [];
            }
        }

        function saveMeals() {
            const today = new Date().toDateString();
            localStorage.setItem('proteinAppMeals_' + today, JSON.stringify(meals));
        }

        function updateDisplay() {
            const consumed = meals.reduce((acc, meal) => ({
                protein: acc.protein + meal.protein,
                carbs: acc.carbs + meal.carbs,
                fats: acc.fats + meal.fats,
                calories: acc.calories + meal.calories
            }), { protein: 0, carbs: 0, fats: 0, calories: 0 });

            document.getElementById('protein-consumed').textContent = Math.round(consumed.protein);
            document.getElementById('protein-goal').textContent = userData.protein;
            document.getElementById('calories-consumed').textContent = Math.round(consumed.calories);
            document.getElementById('carbs-consumed').textContent = Math.round(consumed.carbs);
            document.getElementById('fats-consumed').textContent = Math.round(consumed.fats);

            // Update progress circle
            const progress = Math.min((consumed.protein / userData.protein) * 100, 100);
            const circumference = 2 * Math.PI * 90;
            const offset = circumference - (progress / 100) * circumference;
            document.querySelector('.progress-ring-circle-fill').style.strokeDashoffset = offset;

            // Update meals list
            const mealsList = document.getElementById('meals-list');
            if (meals.length === 0) {
                mealsList.innerHTML = '<div class="empty-state"><p>Добавьте первый прием пищи</p></div>';
            } else {
                mealsList.innerHTML = meals.map(meal => `
                    <div class="meal-item">
                        <div class="meal-info">
                            <h4>${meal.name}</h4>
                            <div class="meal-details">${meal.portion}г • ${Math.round(meal.calories)} ккал</div>
                        </div>
                        <div class="meal-protein">${Math.round(meal.protein)}г</div>
                    </div>
                `).join('');
            }

            generateSuggestions();
        }

        function generateSuggestions() {
            const consumed = meals.reduce((acc, meal) => acc + meal.protein, 0);
            const remaining = userData.protein - consumed;
            
            const suggestionsList = document.getElementById('suggestions-list');
            const suggestionsSection = document.getElementById('suggestions');
            
            if (remaining <= 0) {
                suggestionsSection.style.display = 'none';
                return;
            }
            
            suggestionsSection.style.display = 'block';
            
            const hour = new Date().getHours();
            let suggestions = [];
            
            if (remaining > 50) {
                suggestions = [
                    `До цели осталось ${Math.round(remaining)}г белка`,
                    'Попробуйте: куриная грудка (31г/100г) или лосось (20г/100г)',
                    'Или творог на перекус (18г/100г)'
                ];
            } else if (remaining > 20) {
                suggestions = [
                    `Осталось ${Math.round(remaining)}г белка — вы почти у цели!`,
                    hour > 18 ? 'Вечерний вариант: творог или яйца' : 'Легкий перекус: креветки или яйца'
                ];
            } else {
                suggestions = [
                    `Всего ${Math.round(remaining)}г до цели!`,
                    'Быстрый вариант: 2 яйца (26г белка)'
                ];
            }
            
            suggestionsList.innerHTML = suggestions.map(s => 
                `<div class="suggestion-item">${s}</div>`
            ).join('');
        }

        // Modal
        document.getElementById('add-meal-btn').addEventListener('click', () => {
            document.getElementById('meal-modal').classList.add('active');
            document.getElementById('food-search').value = '';
            document.getElementById('search-results').innerHTML = '';
            document.getElementById('custom-form').classList.remove('active');
            renderFoodCategories();

            // Hide MainButton when modal just opened
            if (tg && tg.MainButton) {
                tg.MainButton.hide();
            }
        });

        document.getElementById('close-modal').addEventListener('click', () => {
            document.getElementById('meal-modal').classList.remove('active');
            document.getElementById('portion-selector').classList.remove('active');
            document.getElementById('custom-form').classList.remove('active');
            
            // Hide MainButton when modal is closed
            if (tg && tg.MainButton) {
                tg.MainButton.hide();
            }
        });

        // Search functionality
        let searchTimeout;
        document.getElementById('food-search').addEventListener('input', (e) => {
            const query = e.target.value.trim().toLowerCase();
            
            clearTimeout(searchTimeout);
            
            if (query.length === 0) {
                document.getElementById('search-results').innerHTML = '';
                document.getElementById('food-categories').style.display = 'block';
                return;
            }
            
            if (query.length < 2) return;
            
            searchTimeout = setTimeout(() => {
                searchFood(query);
            }, 500);
        });

        async function searchFood(query) {
            const searchResults = document.getElementById('search-results');
            const foodCategories = document.getElementById('food-categories');
            
            searchResults.innerHTML = '<div class="search-loading">Ищу...</div>';
            foodCategories.style.display = 'none';
            
            // Search in local database first
            const localResults = searchLocalDatabase(query);
            
            // Search in Open Food Facts
            let externalResults = [];
            try {
                const response = await fetch(`https://world.openfoodfacts.org/cgi/search.pl?search_terms=${encodeURIComponent(query)}&search_simple=1&action=process&json=1&page_size=5`);
                const data = await response.json();
                
                if (data.products && data.products.length > 0) {
                    externalResults = data.products
                        .filter(p => p.nutriments && p.nutriments.proteins_100g)
                        .map(p => ({
                            name: p.product_name || p.product_name_ru || 'Без названия',
                            protein: parseFloat(p.nutriments.proteins_100g) || 0,
                            carbs: parseFloat(p.nutriments.carbohydrates_100g) || 0,
                            fats: parseFloat(p.nutriments.fat_100g) || 0,
                            calories: parseFloat(p.nutriments['energy-kcal_100g']) || 0,
                            source: 'external'
                        }))
                        .slice(0, 5);
                }
            } catch (error) {
                console.log('Open Food Facts search failed, using local results only');
            }
            
            const allResults = [...localResults, ...externalResults];
            
            if (allResults.length === 0) {
                searchResults.innerHTML = '<div class="search-empty">Ничего не найдено. Попробуйте другой запрос или добавьте свой продукт.</div>';
                return;
            }
            
            searchResults.innerHTML = `
                <div class="food-category">
                    <h4 class="category-title">Результаты поиска</h4>
                    ${allResults.map(food => `
                        <div class="food-item" data-food='${JSON.stringify(food)}'>
                            <span class="food-name">${food.name}${food.source === 'external' ? ' 🌐' : ''}</span>
                            <span class="food-protein">${Math.round(food.protein)}г</span>
                        </div>
                    `).join('')}
                </div>
            `;
            
            searchResults.querySelectorAll('.food-item').forEach(item => {
                item.addEventListener('click', () => {
                    selectedFood = JSON.parse(item.dataset.food);
                    portionSize = 100;
                    document.getElementById('portion-amount').textContent = portionSize;
                    document.getElementById('portion-selector').classList.add('active');
                    item.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

                    // Show MainButton when product is selected
                    if (tg && tg.MainButton) {
                        tg.MainButton.show();
                        tg.MainButton.setText('ДОБАВИТЬ ПРОДУКТ');
                    }
                });
            });
        }

        function searchLocalDatabase(query) {
            const results = [];
            
            // Search in custom products
            customProducts.forEach(product => {
                if (product.name.toLowerCase().includes(query)) {
                    results.push(product);
                }
            });
            
            // Search in main database
            Object.values(foodDatabase).forEach(category => {
                category.forEach(food => {
                    if (food.name.toLowerCase().includes(query)) {
                        results.push(food);
                    }
                });
            });
            
            return results.slice(0, 10);
        }

        // Custom product form
        document.getElementById('add-custom-btn').addEventListener('click', () => {
            document.getElementById('custom-form').classList.add('active');
            document.getElementById('food-categories').style.display = 'none';
            document.getElementById('search-results').innerHTML = '';
        });

        document.getElementById('save-custom-product').addEventListener('click', () => {
            const name = document.getElementById('custom-name').value.trim();
            const protein = parseFloat(document.getElementById('custom-protein').value) || 0;
            const fats = parseFloat(document.getElementById('custom-fats').value) || 0;
            const carbs = parseFloat(document.getElementById('custom-carbs').value) || 0;
            const calories = parseFloat(document.getElementById('custom-calories').value) || 0;
            
            if (!name) {
                alert('Введите название продукта');
                return;
            }
            
            const customProduct = {
                name,
                protein,
                carbs,
                fats,
                calories,
                custom: true
            };
            
            customProducts.push(customProduct);
            saveCustomProducts();
            
            // Clear form
            document.getElementById('custom-name').value = '';
            document.getElementById('custom-protein').value = '';
            document.getElementById('custom-fats').value = '';
            document.getElementById('custom-carbs').value = '';
            document.getElementById('custom-calories').value = '';
            
            document.getElementById('custom-form').classList.remove('active');
            renderFoodCategories();
            
            alert('Продукт добавлен!');
        });

        function renderFoodCategories() {
            const container = document.getElementById('food-categories');
            container.style.display = 'block';
            
            let categoriesHTML = '';
            
            // Add custom products if any
            if (customProducts.length > 0) {
                categoriesHTML += `
                    <div class="food-category">
                        <h4 class="category-title">Мои продукты</h4>
                        ${customProducts.map(food => `
                            <div class="food-item" data-food='${JSON.stringify(food)}'>
                                <span class="food-name">${food.name} ⭐</span>
                                <span class="food-protein">${Math.round(food.protein)}г</span>
                            </div>
                        `).join('')}
                    </div>
                `;
            }
            
            // Add main database
            categoriesHTML += Object.entries(foodDatabase).map(([category, foods]) => `
                <div class="food-category">
                    <h4 class="category-title">${category}</h4>
                    ${foods.map(food => `
                        <div class="food-item" data-food='${JSON.stringify(food)}'>
                            <span class="food-name">${food.name}</span>
                            <span class="food-protein">${Math.round(food.protein)}г</span>
                        </div>
                    `).join('')}
                </div>
            `).join('');
            
            container.innerHTML = categoriesHTML;

            container.querySelectorAll('.food-item').forEach(item => {
                item.addEventListener('click', () => {
                    selectedFood = JSON.parse(item.dataset.food);
                    portionSize = 100;
                    document.getElementById('portion-amount').textContent = portionSize;
                    document.getElementById('portion-selector').classList.add('active');
                    item.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

                    // Show MainButton when product is selected
                    if (tg && tg.MainButton) {
                        tg.MainButton.show();
                        tg.MainButton.setText('ДОБАВИТЬ ПРОДУКТ');
                    }
                });
            });
        }

        document.getElementById('decrease-portion').addEventListener('click', () => {
            if (portionSize > 10) {
                portionSize = Math.max(10, portionSize - 10);
                document.getElementById('portion-amount').textContent = portionSize;
            }
        });

        document.getElementById('increase-portion').addEventListener('click', () => {
            portionSize = Math.min(500, portionSize + 10);
            document.getElementById('portion-amount').textContent = portionSize;
        });

        document.getElementById('confirm-meal').addEventListener('click', () => {
            if (!selectedFood) return;

            const multiplier = portionSize / 100;
            const meal = {
                name: selectedFood.name,
                portion: portionSize,
                protein: selectedFood.protein * multiplier,
                carbs: selectedFood.carbs * multiplier,
                fats: selectedFood.fats * multiplier,
                calories: selectedFood.calories * multiplier,
                time: new Date().toISOString()
            };

            meals.push(meal);
            saveMeals();
            updateDisplay();

            document.getElementById('meal-modal').classList.remove('active');
            document.getElementById('portion-selector').classList.remove('active');
            
            // Hide MainButton and reset
            if (tg && tg.MainButton) {
                tg.MainButton.hide();
            }
            
            // Haptic feedback
            if (tg && tg.HapticFeedback) {
                tg.HapticFeedback.notificationOccurred('success');
            }
        });

        // Register Service Worker for PWA - отключен для разработки

        if ('serviceWorker' in navigator) {

                    .then(reg => console.log('Service Worker registered'))
                    .catch(err => console.log('Service Worker registration failed'));
            });
        }
        */
    </script>
</body>
</html>
